<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="Styles/index.css">
</head>
<body>
    <div class="main-container">
        <div class="title-box">
            <h1>CALCULATOR</h1>
        </div>

        <div class="main-screen" id="screen"></div>
        <div class="history" id="history"></div>

        <div class="btn-container">
            <div class="Btn" onclick="handleClick(7)">7</div>
            <div class="Btn" onclick="handleClick(8)">8</div>
            <div class="Btn" onclick="handleClick(9)">9</div>
            <div class="Btn operator" onclick="handleClick('x')">×</div>
        </div>

        <div class="btn-container">
            <div class="Btn" onclick="handleClick(4)">4</div>
            <div class="Btn" onclick="handleClick(5)">5</div>
            <div class="Btn" onclick="handleClick(6)">6</div>
            <div class="Btn operator" onclick="handleClick('-')">−</div>
        </div>

        <div class="btn-container">
            <div class="Btn" onclick="handleClick(1)">1</div>
            <div class="Btn" onclick="handleClick(2)">2</div>
            <div class="Btn" onclick="handleClick(3)">3</div>
            <div class="Btn operator" onclick="handleClick('+')">+</div>
        </div>

        <div class="btn-container">
            <div class="Btn clear" onclick="handleClick('c')">AC</div>
            <div class="Btn" onclick="handleClick('0')">0</div>
            <div class="Btn equal" onclick="handleClick('=')">=</div>
            <div class="Btn operator" onclick="handleClick('/')">÷</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
